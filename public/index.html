<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORLUN — Статистика</title>
    <style>
        body {
            background-color: #120f18;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .widget {
            background: #1e1b24;
            border-radius: 12px;
            padding: 20px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h3 { margin-top: 0; color: #a27bca; }
        .chart-container {
            position: relative;
            height: 150px;
            margin-top: 15px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 2px solid #332d3a;
            border-left: 2px solid #332d3a;
            padding: 10px 5px 0 5px;
        }
        .chart-column {
            position: relative;
            width: 12%;
            background: linear-gradient(to top, #7a4bb2, #a27bca);
            border-radius: 4px 4px 0 0;
            transition: height 0.4s ease;
            text-align: center;
        }
        .chart-column:hover::after {
            content: attr(data-visits);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2938;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            z-index: 10;
        }
        .chart-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 10px;
            color: #8c8597;
            padding-left: 5px;
        }
        .label-item {
            width: 12%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="widget">
        <h3>Посещаемость сайта (Неделя)</h3>
        <div class="chart-container" id="chart">
            </div>
        <div class="chart-labels" id="labels">
            </div>
    </div>

    <script>
        async function fetchVisits() {
            try {
                // Обращаемся к вашему серверному скрипту API на Vercel
                const response = await fetch('/api/visit'); 
                const data = await response.json();
                
                console.log('Полученные данные визитов:', data);

                if (!Array.isArray(data) || data.length === 0) {
                    renderEmptyChart();
                    return;
                }

                // 1. Группируем визиты по дням (ДД.ММ)
                const visitsByDay = {};
                
                data.forEach(item => {
                    if (!item.visited_at) return;
                    const dateObj = new Date(item.visited_at);
                    // Форматируем дату как ДД.ММ
                    const day = String(dateObj.getDate()).padStart(2, '0');
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const dateKey = `${day}.${month}`;
                    
                    visitsByDay[dateKey] = (visitsByDay[dateKey] || 0) + 1;
                });

                // 2. Берем срез ровно за последние 7 дней
                const sortedDays = Object.keys(visitsByDay).sort();
                const last7DaysKeys = sortedDays.slice(-7);

                const chartData = last7DaysKeys.map(date => ({
                    date: date,
                    visits: visitsByDay[date]
                }));

                // Если записей меньше 7, дополняем пустыми днями для красивой сетки
                while (chartData.length < 7) {
                    chartData.unshift({ date: '--.--', visits: 0 });
                }

                renderChart(chartData);

            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
                renderEmptyChart();
            }
        }

        function renderChart(data) {
            const chartContainer = document.getElementById('chart');
            const labelsContainer = document.getElementById('labels');
            
            chartContainer.innerHTML = '';
            labelsContainer.innerHTML = '';

            // Находим максимальное значение для масштабирования высоты (минимум 5 для наглядности)
            const maxVisits = Math.max(5, ...data.map(d => d.visits));

            data.forEach(item => {
                // Считаем высоту в процентах от максимума (максимальный = 90% высоты контейнера)
                const heightPercentage = maxVisits > 0 ? (item.visits / maxVisits) * 90 : 0;

                // Создаем столбик графика
                const column = document.createElement('div');
                column.className = 'chart-column';
                column.style.height = `${heightPercentage}%`;
                column.setAttribute('data-visits', `${item.visits} чел.`);
                chartContainer.appendChild(column);

                // Создаем подпись снизу
                const label = document.createElement('div');
                label.className = 'label-item';
                label.textContent = item.date;
                labelsContainer.appendChild(label);
            });
        }

        function renderEmptyChart() {
            // Заглушка, если база пуста
            const emptyData = Array.from({length: 7}, () => ({ date: '--.--', visits: 0 }));
            renderChart(emptyData);
        }

        // Запуск при загрузке страницы
        fetchVisits();
    </script>
</body>
</html>
